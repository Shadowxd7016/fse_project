<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>

<body>
  
  <nav id="navbar">
</nav>


<section class="bg-gray-900 text-white py-20 px-4">
  
  <div class="max-w-4xl mx-auto text-center">
    <h1 class="text-4xl md:text-6xl font-bold mb-6">Buy Smart. Sell Fast.</h1>
    <p class="text-lg text-gray-400 mb-10">Find the best deals on phones, cars, furniture, and more.</p>
    
<div class="relative max-w-xl mx-auto">
  <input type="text" id="searchInput" placeholder="What are you looking for today?" 
         class="w-full py-4 pl-12 pr-4 rounded-full bg-white text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-500">
  </div>



<div id="category-sections" class="block">
   </div>
  </div>
</section>
<div id="search-results-section" class="hidden mx-auto max-w-2xl px-4 py-16 sm:px-6 lg:max-w-7xl lg:px-8">
  <h2 id="search-title" class="text-2xl font-bold tracking-tight text-gray-900">Search Results</h2>
  <div id="search-grid" class="mt-6 grid grid-cols-1 gap-x-6 gap-y-10 sm:grid-cols-2 lg:grid-cols-4 xl:gap-x-8"></div>
</div>
 <div id="all-categories" class="mx-auto max-w-2xl px-4 py-16 sm:px-6 sm:py-24 lg:max-w-7xl lg:px-8">
  <h2 class="text-2xl font-bold tracking-tight text-gray-900">Mobile Phones</h2>
  <div id="grid-mobile" class="mt-6 grid grid-cols-1 gap-x-6 gap-y-10 sm:grid-cols-2 lg:grid-cols-4 xl:gap-x-8 mb-12"></div>

  <h2 class="text-2xl font-bold tracking-tight text-gray-900">Laptops</h2>
  <div id="grid-laptop" class="mt-6 grid grid-cols-1 gap-x-6 gap-y-10 sm:grid-cols-2 lg:grid-cols-4 xl:gap-x-8 mb-12"></div>

  <h2 class="text-2xl font-bold tracking-tight text-gray-900">Tablets</h2>
  <div id="grid-tablet" class="mt-6 grid grid-cols-1 gap-x-6 gap-y-10 sm:grid-cols-2 lg:grid-cols-4 xl:gap-x-8 mb-12"></div>

  <h2 class="text-2xl font-bold tracking-tight text-gray-900">Cameras</h2>
  <div id="grid-camera" class="mt-6 grid grid-cols-1 gap-x-6 gap-y-10 sm:grid-cols-2 lg:grid-cols-4 xl:gap-x-8"></div>
</div>




  <footer id = "footer"></footer>

  <script src="supabase_config.js"></script>
  <script src="script.js"></script>
  <script type = "module" src="js/component.js"></script>
</body>

</html>
