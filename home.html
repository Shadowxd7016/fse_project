<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FixKar | Buy Smart. Sell Fast.</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f9fafb; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }

        /* ══════════════════════════════
           NAVBAR
        ══════════════════════════════ */
        #navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            height: 64px;
            background: #ffffff;
            border-bottom: 1px solid #f0f0f0;
            position: sticky;
            top: 0;
            z-index: 999;
            box-shadow: 0 1px 12px rgba(0,0,0,0.06);
        }

        .nav-logo {
            font-family: 'Syne', sans-serif;
            font-size: 22px;
            font-weight: 800;
            color: #111;
            letter-spacing: -0.5px;
            cursor: pointer;
            text-decoration: none;
        }
        .nav-logo span { color: #ef4444; }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 32px;
        }
        .nav-links a {
            text-decoration: none;
            color: #555;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
            position: relative;
        }
        .nav-links a:hover { color: #111; }
        .nav-links a.active { color: #111; font-weight: 700; }
        .nav-links a.active::after {
            content: '';
            position: absolute;
            bottom: -4px; left: 0; right: 0;
            height: 2px;
            background: #ef4444;
            border-radius: 2px;
        }

        .nav-actions { display: flex; align-items: center; gap: 12px; }

        .nav-repair-btn {
            display: flex; align-items: center; gap: 6px;
            padding: 7px 16px;
            background: #f9fafb;
            border: 1.5px solid #e5e7eb;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            color: #374151;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.15s;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .nav-repair-btn:hover { background: #f3f4f6; border-color: #d1d5db; color: #111; }

        #auth-btn {
            padding: 8px 20px;
            background: #111;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: background 0.2s;
        }
        #auth-btn:hover { background: #333; }

        .profile-icon {
            width: 36px; height: 36px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
            border: 2px solid #e5e7eb;
            transition: border-color 0.2s;
        }
        .profile-icon:hover { border-color: #ef4444; }

        /* ══════════════════════════════
           HERO
        ══════════════════════════════ */
        .hero {
            background: #111;
            color: #fff;
            padding: 72px 24px 80px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .hero::before {
            content: '';
            position: absolute;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(239,68,68,0.15) 0%, transparent 70%);
            top: -200px; left: 50%; transform: translateX(-50%);
            pointer-events: none;
        }
        .hero h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(36px, 6vw, 64px);
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 16px;
        }
        .hero h1 span { color: #ef4444; }
        .hero p { font-size: 16px; color: rgba(255,255,255,0.55); margin-bottom: 36px; }

        .search-bar-wrap {
            position: relative;
            max-width: 560px;
            margin: 0 auto 20px;
        }
        .search-bar-wrap .search-icon {
            position: absolute; left: 18px; top: 50%; transform: translateY(-50%);
            color: #9ca3af; font-size: 18px; pointer-events: none;
        }
        #searchInput {
            width: 100%;
            padding: 16px 18px 16px 50px;
            border-radius: 14px;
            border: none;
            font-size: 15px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            outline: none;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            color: #111;
        }
        #searchInput:focus { box-shadow: 0 8px 32px rgba(239,68,68,0.25); }

        .hero-filters {
            display: flex; gap: 8px; flex-wrap: wrap;
            justify-content: center; margin-top: 16px;
        }
        .hero-filter-btn {
            padding: 7px 16px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 999px;
            font-size: 12px; font-weight: 600;
            color: rgba(255,255,255,0.75);
            cursor: pointer;
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: all 0.15s;
        }
        .hero-filter-btn:hover, .hero-filter-btn.active {
            background: #ef4444; border-color: #ef4444; color: #fff;
        }

        /* ══════════════════════════════
           FILTER SIDEBAR + LAYOUT
        ══════════════════════════════ */
        .page-layout {
            display: flex;
            gap: 28px;
            max-width: 1400px;
            margin: 0 auto;
            padding: 32px 40px;
            align-items: flex-start;
        }

        .filter-sidebar {
            width: 240px;
            flex-shrink: 0;
            background: #fff;
            border-radius: 14px;
            border: 1px solid #f0f0f0;
            padding: 22px 18px;
            position: sticky;
            top: 80px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }
        .filter-sidebar h3 {
            font-family: 'Syne', sans-serif;
            font-size: 13px; font-weight: 800;
            text-transform: uppercase; letter-spacing: 1px;
            margin-bottom: 18px; padding-bottom: 10px;
            border-bottom: 2px solid #111;
            color: #111;
        }
        .filter-group { margin-bottom: 20px; }
        .filter-group label {
            display: block; font-size: 10px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.7px;
            color: #9ca3af; margin-bottom: 8px;
        }
        .filter-group input,
        .filter-group select {
            width: 100%; padding: 9px 12px;
            border: 1.5px solid #e5e7eb; border-radius: 8px;
            font-size: 13px; font-family: 'Plus Jakarta Sans', sans-serif;
            outline: none; background: #fafafa; transition: border-color 0.2s;
        }
        .filter-group input:focus,
        .filter-group select:focus { border-color: #111; background: #fff; }
        .price-row { display: flex; gap: 8px; }
        .price-row input { width: 50% !important; }

        .condition-list { display: flex; flex-direction: column; gap: 7px; }
        .condition-list label {
            display: flex; align-items: center; gap: 8px;
            font-size: 13px; font-weight: 500; text-transform: none;
            letter-spacing: 0; color: #374151; cursor: pointer;
        }
        .condition-list input[type="checkbox"] { accent-color: #111; width: 14px; height: 14px; flex-shrink: 0; }

        .filter-actions { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
        .btn-apply {
            width: 100%; padding: 10px; background: #111; color: #fff;
            border: none; border-radius: 8px; font-size: 12px; font-weight: 700;
            cursor: pointer; font-family: 'Plus Jakarta Sans', sans-serif; transition: background 0.2s;
        }
        .btn-apply:hover { background: #333; }
        .btn-reset {
            width: 100%; padding: 10px; background: transparent; color: #9ca3af;
            border: 1.5px solid #e5e7eb; border-radius: 8px; font-size: 12px;
            font-weight: 600; cursor: pointer; font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.2s;
        }
        .btn-reset:hover { border-color: #111; color: #111; }

        /* ══════════════════════════════
           MAIN CONTENT
        ══════════════════════════════ */
        .main-content { flex: 1; min-width: 0; }

        #results-count {
            font-size: 12px; color: #9ca3af; font-weight: 500; margin-bottom: 16px; display: block;
        }

        .section-heading {
            display: flex; align-items: center; gap: 8px;
            font-family: 'Syne', sans-serif;
            font-size: 18px; font-weight: 800; color: #111;
            margin-bottom: 16px; margin-top: 32px;
        }
        .section-heading:first-child { margin-top: 0; }
        .section-heading .material-symbols-outlined { font-size: 20px; color: #ef4444; }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 12px;
        }

        /* ══════════════════════════════
           PRODUCT CARD
        ══════════════════════════════ */
        .product-card {
            background: #fff;
            border-radius: 12px;
            padding: 12px;
            border: 1px solid #f1f1f1;
            transition: all 0.25s ease;
            cursor: pointer;
            position: relative;
        }
        .product-card:hover {
            box-shadow: 0 10px 28px rgba(0,0,0,0.08);
            transform: translateY(-4px);
            border-color: #ef4444;
        }
        .product-image-container {
            aspect-ratio: 1/1;
            width: 100%; overflow: hidden;
            border-radius: 8px; background: #f9fafb;
            margin-bottom: 10px;
        }
        .product-image-container img {
            width: 100%; height: 100%; object-fit: cover;
            transition: transform 0.4s ease;
        }
        .product-card:hover img { transform: scale(1.05); }
        .product-title {
            font-size: 13px; font-weight: 700; color: #111;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            margin-bottom: 4px;
        }
        .price-tag { color: #ef4444; font-weight: 800; font-size: 15px; }
        .product-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
        .badge {
            font-size: 9px; font-weight: 800; text-transform: uppercase;
            padding: 2px 8px; border-radius: 999px; letter-spacing: 0.4px;
        }
        .badge-cat { background: #f3f4f6; color: #6b7280; }
        .badge-new { background: #dcfce7; color: #15803d; }
        .badge-used { background: #fef3c7; color: #92400e; }
        .badge-refurb { background: #dbeafe; color: #1d4ed8; }
        .badge-damaged { background: #fee2e2; color: #991b1b; }
        .badge-boosted {
            position: absolute; top: 10px; left: 10px;
            background: #f59e0b; color: #fff;
            font-size: 9px; font-weight: 800;
            padding: 2px 8px; border-radius: 999px;
            text-transform: uppercase;
        }

        /* Empty state */
        .empty-state {
            text-align: center; padding: 60px 20px; color: #9ca3af;
        }
        .empty-state i { font-size: 40px; display: block; margin-bottom: 12px; }
        .empty-state h3 { font-size: 16px; font-weight: 700; color: #374151; margin-bottom: 6px; }

        /* ══════════════════════════════
           FOOTER
        ══════════════════════════════ */
        #footer {
            background: #fff; border-top: 1px solid #f0f0f0;
            padding: 48px 24px 24px; margin-top: 60px;
        }
        .footer-inner { max-width: 1200px; margin: 0 auto; text-align: center; }
        .footer-logo-txt {
            font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800;
            margin-bottom: 8px;
        }
        .footer-logo-txt span { color: #ef4444; }
        .footer-inner p { font-size: 13px; color: #9ca3af; margin-bottom: 20px; }
        .footer-links { display: flex; justify-content: center; gap: 24px; margin-bottom: 24px; }
        .footer-links a { font-size: 13px; color: #6b7280; text-decoration: none; transition: color 0.2s; }
        .footer-links a:hover { color: #ef4444; }
        .footer-bottom { font-size: 12px; color: #d1d5db; border-top: 1px solid #f0f0f0; padding-top: 20px; }

        /* ══════════════════════════════
           RESPONSIVE
        ══════════════════════════════ */
        @media (max-width: 900px) {
            .page-layout { flex-direction: column; padding: 20px; }
            .filter-sidebar { width: 100%; position: static; }
            #navbar { padding: 0 20px; }
            .nav-links { display: none; }
        }
    </style>
</head>
<body>

    <!-- ══ NAVBAR ══ -->
    <nav id="navbar">
        <a href="home.html" class="nav-logo">Fix<span>Kar</span></a>

        <div class="nav-links">
            <a href="home.html" class="active">Home</a>
            <a href="About us.html">About Us</a>
            <a href="Contact Us.html">Contact Us</a>
            <a href="technicians.html">🔧 Repair</a>
        </div>

        <div class="nav-actions">
            <a href="technicians.html" class="nav-repair-btn">
                <i class="fas fa-tools" style="font-size:12px;"></i> Find Technician
            </a>
            <button id="auth-btn">Sign Up</button>
        </div>
    </nav>

    <!-- ══ HERO ══ -->
    <section class="hero">
        <h1>Buy Smart. <span>Sell Fast.</span></h1>
        <p>Find the best deals on phones, laptops, furniture, and more.</p>
        <div class="search-bar-wrap">
            <span class="material-symbols-outlined search-icon">search</span>
            <input type="text" id="searchInput" placeholder="Search products...">
        </div>
        <div class="hero-filters">
            <button class="hero-filter-btn active" onclick="heroFilter(this, '')">All</button>
            <button class="hero-filter-btn" onclick="heroFilter(this, 'Electronics')">Electronics</button>
            <button class="hero-filter-btn" onclick="heroFilter(this, 'Furniture')">Furniture</button>
            <button class="hero-filter-btn" onclick="heroFilter(this, 'Vehicles')">Vehicles</button>
            <button class="hero-filter-btn" onclick="heroFilter(this, 'Fashion')">Fashion</button>
            <button class="hero-filter-btn" onclick="heroFilter(this, 'Books')">Books</button>
        </div>
    </section>

    <!-- ══ PAGE LAYOUT ══ -->
    <div class="page-layout">

        <!-- FILTER SIDEBAR -->
        <aside class="filter-sidebar">
            <h3>🔍 Filters</h3>

            <div class="filter-group">
                <label>Search</label>
                <input type="text" id="sidebarSearch" placeholder="Keyword...">
            </div>

            <div class="filter-group">
                <label>Category</label>
                <select id="categoryFilter">
                    <option value="">All Categories</option>
                    <option value="Electronics">Electronics & Mobiles</option>
                    <option value="Furniture">Furniture</option>
                    <option value="Appliances">Home Appliances</option>
                    <option value="Vehicles">Vehicles</option>
                    <option value="Fashion">Fashion & Beauty</option>
                    <option value="Books">Books & Hobbies</option>
                    <option value="Services">Services</option>
                    <option value="Eco-Friendly">Eco-Friendly Products</option>
                </select>
            </div>

            <div class="filter-group">
                <label>Price Range (Rs)</label>
                <div class="price-row">
                    <input type="number" id="minPrice" placeholder="Min">
                    <input type="number" id="maxPrice" placeholder="Max">
                </div>
            </div>

            <div class="filter-group">
                <label>Condition</label>
                <div class="condition-list">
                    <label><input type="checkbox" value="Like New"> Like New</label>
                    <label><input type="checkbox" value="Refurbished"> Refurbished</label>
                    <label><input type="checkbox" value="Used"> Used</label>
                    <label><input type="checkbox" value="Damaged"> Damaged (For Parts)</label>
                </div>
            </div>

            <div class="filter-actions">
                <button class="btn-apply" onclick="applyFilters()">Apply Filters</button>
                <button class="btn-reset" onclick="resetFilters()">Reset</button>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <div class="main-content">
            <span id="results-count"></span>
            <div id="products-wrapper"></div>
        </div>
    </div>

    <!-- FOOTER -->
    <footer id="footer">
        <div class="footer-inner">
            <div class="footer-logo-txt">Fix<span>Kar</span></div>
            <p>Pakistan's most trusted resale marketplace.</p>
            <div class="footer-links">
                <a href="home.html">Home</a>
                <a href="technicians.html">Repair</a>
                <a href="About us.html">About Us</a>
                <a href="Contact Us.html">Contact Us</a>
            </div>
            <div class="footer-bottom">© 2026 FixKar. All rights reserved.</div>
        </div>
    </footer>

    <script src="supabase_config.js"></script>
    <script src="navbar.js"></script>
    <script>

        /* ── CONDITION BADGE ── */
        function condBadge(condition) {
            const map = { 'Like New': 'badge-new', 'Refurbished': 'badge-refurb', 'Used': 'badge-used', 'Damaged': 'badge-damaged' };
            if (!condition) return '';
            return `<span class="badge ${map[condition] || 'badge-cat'}">${condition}</span>`;
        }

        /* ── MAKE CARD ── */
        function makeCard(product) {
            const image = product.image_urls?.[0] || 'fallback.jpg';
            const div   = document.createElement('div');
            div.className = 'product-card';
            div.innerHTML = `
                ${product.paid_ad ? `<span class="badge-boosted">⚡ Featured</span>` : ''}
                <div class="product-image-container">
                    <img src="${image}" alt="${product.title}" loading="lazy">
                </div>
                <div class="product-title">${product.title}</div>
                <div class="price-tag">Rs ${Number(product.price).toLocaleString()}</div>
                <div class="product-meta">
                    <span class="badge badge-cat">${product.category || ''}</span>
                    ${condBadge(product.condition)}
                </div>
            `;
            div.onclick = () => window.location.href = `product.html?id=${product.id}`;
            return div;
        }

        /* ── CATEGORY SECTIONS CONFIG ── */
        const CATEGORY_SECTIONS = [
            { key: 'Electronics', label: 'Electronics & Mobiles',  icon: 'smartphone' },
            { key: 'Furniture',   label: 'Furniture',               icon: 'chair' },
            { key: 'Vehicles',    label: 'Vehicles',                icon: 'directions_car' },
            { key: 'Appliances',  label: 'Home Appliances',         icon: 'kitchen' },
            { key: 'Fashion',     label: 'Fashion & Beauty',        icon: 'checkroom' },
            { key: 'Books',       label: 'Books & Hobbies',         icon: 'menu_book' },
            { key: 'Services',    label: 'Services',                icon: 'build' },
            { key: 'Eco-Friendly',label: 'Eco-Friendly Products',   icon: 'eco' },
        ];

        /* ── FETCH FROM SUPABASE ── */
        async function fetchProducts(filters = {}) {
            let query = db.from('products').select('*');

            const search = (filters.search || '').trim();
            if (search)                    query = query.ilike('title', `%${search}%`);
            if (filters.category)          query = query.eq('category', filters.category);
            if (filters.minPrice)          query = query.gte('price', parseFloat(filters.minPrice));
            if (filters.maxPrice)          query = query.lte('price', parseFloat(filters.maxPrice));
            if (filters.conditions?.length) query = query.in('condition', filters.conditions);

            const { data, error } = await query;
            if (error) { console.error(error); return; }
            displayProducts(data || [], filters);
        }

        /* ── DISPLAY ── */
        function displayProducts(products, filters = {}) {
            const wrapper    = document.getElementById('products-wrapper');
            const countLabel = document.getElementById('results-count');
            wrapper.innerHTML = '';

            countLabel.innerText = products.length
                ? `${products.length} result${products.length !== 1 ? 's' : ''} found`
                : '';

            if (!products.length) {
                wrapper.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-search"></i>
                        <h3>No products found</h3>
                        <p style="font-size:13px;">Try adjusting your search or filters</p>
                    </div>`;
                return;
            }

            const isFiltered = filters.search || filters.category ||
                               filters.minPrice || filters.maxPrice ||
                               filters.conditions?.length;

            if (isFiltered) {
                // Flat grid for search/filter results
                const heading = document.createElement('h2');
                heading.className = 'section-heading';
                heading.innerHTML = `<span class="material-symbols-outlined">filter_list</span> Results`;
                const grid = document.createElement('div');
                grid.className = 'products-grid';
                products.forEach(p => grid.appendChild(makeCard(p)));
                wrapper.appendChild(heading);
                wrapper.appendChild(grid);
            } else {
                // Grouped by category
                CATEGORY_SECTIONS.forEach(sec => {
                    const items = products.filter(p => p.category === sec.key);
                    if (!items.length) return;
                    const heading = document.createElement('h2');
                    heading.className = 'section-heading';
                    heading.innerHTML = `<span class="material-symbols-outlined">${sec.icon}</span> ${sec.label}`;
                    const grid = document.createElement('div');
                    grid.className = 'products-grid';
                    items.forEach(p => grid.appendChild(makeCard(p)));
                    wrapper.appendChild(heading);
                    wrapper.appendChild(grid);
                });
                // Other categories
                const known  = CATEGORY_SECTIONS.map(s => s.key);
                const others = products.filter(p => !known.includes(p.category));
                if (others.length) {
                    const heading = document.createElement('h2');
                    heading.className = 'section-heading';
                    heading.innerHTML = `<span class="material-symbols-outlined">explore</span> More for You`;
                    const grid = document.createElement('div');
                    grid.className = 'products-grid';
                    others.forEach(p => grid.appendChild(makeCard(p)));
                    wrapper.appendChild(heading);
                    wrapper.appendChild(grid);
                }
            }
        }

        /* ── GET FILTER VALUES ── */
        function getFilters() {
            const heroVal    = document.getElementById('searchInput').value.trim();
            const sidebarVal = document.getElementById('sidebarSearch').value.trim();
            return {
                search:     heroVal || sidebarVal,
                category:   document.getElementById('categoryFilter').value,
                minPrice:   document.getElementById('minPrice').value,
                maxPrice:   document.getElementById('maxPrice').value,
                conditions: Array.from(document.querySelectorAll('.condition-list input:checked')).map(cb => cb.value)
            };
        }

        function applyFilters() { fetchProducts(getFilters()); }

        function resetFilters() {
            document.getElementById('searchInput').value    = '';
            document.getElementById('sidebarSearch').value  = '';
            document.getElementById('categoryFilter').value = '';
            document.getElementById('minPrice').value       = '';
            document.getElementById('maxPrice').value       = '';
            document.querySelectorAll('.condition-list input').forEach(cb => cb.checked = false);
            document.querySelectorAll('.hero-filter-btn').forEach((b,i) => b.classList.toggle('active', i===0));
            fetchProducts();
        }

        function heroFilter(btn, cat) {
            document.querySelectorAll('.hero-filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('categoryFilter').value = cat;
            document.getElementById('sidebarSearch').value  = '';
            applyFilters();
        }

        /* ── LIVE SEARCH ── */
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('searchInput').addEventListener('input', () => {
                document.getElementById('sidebarSearch').value = '';
                applyFilters();
            });
            document.getElementById('sidebarSearch').addEventListener('input', () => {
                document.getElementById('searchInput').value = '';
                applyFilters();
            });
        });

        /* ── INITIAL LOAD ── */
        fetchProducts();
    </script>
</body>
</html>
