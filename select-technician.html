<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FixKar | Select Technician</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --red: #ef4444;
            --red-dark: #dc2626;
            --dark: #0f172a;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-500: #6b7280;
            --border: #f1f5f9;
            --white: #ffffff;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--gray-50); 
            color: var(--dark); 
            min-height: 100vh; 
            padding-bottom: 140px; 
        }

        /* ── NAVBAR SYNC ── */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1.2rem 5%; background: var(--white);
            border-bottom: 1px solid var(--gray-100); position: sticky; top: 0; z-index: 100;
        }
        .logo { font-weight: 800; font-size: 1.6rem; text-decoration: none; color: var(--dark);
             font-style: italic; }
        .logo span { color: var(--red); }
        .nav-links { display: flex; gap: 2rem; align-items: center; }
        .nav-links a { text-decoration: none; color: var(--gray-500); font-weight: 600; font-size: 0.9rem; transition: 0.2s; }
        .nav-links a:hover { color: var(--red); }

        /* ── HEADER ── */
        .page-header { max-width: 1200px; margin: 50px auto 30px; padding: 0 2.5rem; }
        .product-pill { 
            display: inline-flex; align-items: center; 
            gap: 8px;
            background: var(--white);
            padding: 8px 18px; 
            border-radius: 100px; 
            border: 1px solid var(--border);
            margin-bottom: 20px; font-size: 0.85rem; 
            font-weight: 600; color: var(--gray-500);
        }
        .product-pill strong { color: var(--red); }
        .page-title { font-size: 2.8rem; font-weight: 800; letter-spacing: -0.02em; }
        .page-title span { color: var(--red); }

        /* ── TECHNICIAN GRID ── */
        .main-content { max-width: 1200px; margin: 0 auto; padding: 0 2.5rem; }
        .tech-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }

        .tech-card {
            background: var(--white); border: 1px solid var(--border);
            border-radius: 24px; padding: 30px; cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative;
        }
        .tech-card:hover { transform: translateY(-5px); border-color: var(--red); box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        .tech-card.selected { border-color: var(--red); border-width: 2px; background: #fffcfc; box-shadow: 0 15px 30px rgba(239, 68, 68, 0.08); }
        
        .tech-avatar { 
            width: 75px; height: 75px; border-radius: 20px; 
            background: var(--dark); color: white; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 800; font-size: 1.6rem; 
            margin-bottom: 20px; overflow: hidden;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .tech-avatar img { width: 100%; height: 100%; object-fit: cover; }

        .tech-name { font-size: 1.35rem; font-weight: 800; margin-bottom: 5px; color: var(--dark); }
        .tech-email { color: var(--gray-500); font-size: 0.85rem; margin-bottom: 12px; display: block; font-weight: 500; }
        .tech-expertise { font-weight: 700; color: var(--red); margin-bottom: 20px; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.02em;}
        
        .tech-meta { border-top: 1px solid var(--gray-100); padding-top: 20px; display: flex; flex-direction: column; gap: 12px; font-size: 0.85rem; color: var(--gray-500); font-weight: 500; }
        .meta-item { display: flex; align-items: center; gap: 10px; }
        .meta-item span { color: var(--red); font-size: 1.2rem; }

        /* ── SUBMIT BAR SYNC ── */
        .submit-bar {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 900px; background: var(--dark);
            padding: 22px 45px; border-radius: 100px; 
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); z-index: 1000;
        }
        .selected-info p { font-size: 0.75rem; color: #94a3b8; font-weight: 700; text-transform: uppercase; margin-bottom: 2px;}
        .selected-info strong { color: var(--white); font-size: 1.1rem; }

        .btn-submit { 
            background: var(--red); color: white; border: none; padding: 14px 40px; 
            border-radius: 100px; font-weight: 800; cursor: pointer; transition: 0.3s;
            font-size: 1rem;
        }
        .btn-submit:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
        .btn-submit:hover:not(:disabled) { background: var(--white); color: var(--dark); transform: scale(1.05); }

        /* ── SUCCESS MODAL ── */
        .success-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.85); display: none; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(10px); }
        .success-modal { background: white; padding: 60px 40px; border-radius: 40px; text-align: center; max-width: 450px; width: 90%; }
        .success-icon { font-size: 5rem; color: #22c55e; margin-bottom: 20px; }
    </style>
</head>
<body>

<nav>
    <a href="home.html" class="logo">Fix<span>Kar</span></a>
    <div class="nav-links">
        <a href="home.html">Home</a>
        <a href="About us.html">About Us</a>
        <a href="Contact Us.html">Contact Us</a>
    </div>
</nav>

<div class="page-header">
    <div class="product-pill">
        <span class="material-symbols-outlined" style="font-size: 1.2rem;">construction</span>
        Repair for: <strong id="prodName">...</strong>
    </div>
    <h1 class="page-title">Select <span>Technician</span></h1>
</div>

<div class="main-content">
    <div class="tech-grid" id="techGrid">
        <p style="padding: 40px; color: var(--gray-500);">Searching for experts...</p>
    </div>
</div>

<div class="submit-bar">
    <div class="selected-info">
        <p>Selected Professional</p>
        <strong id="selectedName">None chosen yet</strong>
    </div>
    <button class="btn-submit" id="submitBtn" disabled onclick="submitRepair()">Send Request</button>
</div>

<div class="success-overlay" id="successOverlay">
    <div class="success-modal">
        <span class="success-icon material-symbols-outlined">check_circle</span>
        <h2 style="font-size: 2rem; font-weight: 800; margin-bottom: 15px;">Request Sent!</h2>
        <p style="color: var(--gray-500); line-height: 1.6; margin-bottom: 30px;">The technician has been notified. They will review your product details and contact you via your profile email.</p>
        <button class="btn-submit" style="width: 100%;" onclick="window.location.href='home.html'">Back to Home</button>
    </div>
</div>

<script src="supabase_config.js"></script>
<script>
    const params = new URLSearchParams(window.location.search);
    const productId = params.get('product_id');
    const productName = params.get('product_name') || 'Item';
    document.getElementById('prodName').textContent = decodeURIComponent(productName);

    let selectedTechId = null;

    async function loadTechnicians() {
        const grid = document.getElementById('techGrid');
        
        try {
            const { data, error } = await db
                .from('technicians')
                .select(`
                    id,
                    experience_years,
                    category,
                    profiles (
                        first_name,
                        last_name,
                        email,
                        avatar_url
                    )
                `);

            if (error) throw error;

            grid.innerHTML = '';
            data.forEach(tech => {
                const profile = tech.profiles;
                const fullName = `${profile.first_name} ${profile.last_name}`;
                    const initials = (profile.first_name[0] + (profile.last_name ? profile.last_name[0] : '')).toUpperCase();
                let avatarContent = initials;
                if (profile.avatar_url && profile.avatar_url.trim() !== "") {
                    avatarContent = `<img src="${profile.avatar_url}" alt="${fullName}" onerror="this.parentElement.innerHTML='${initials}'">`;
                }

                const card = document.createElement('div');
                card.className = 'tech-card';
                card.onclick = () => {
                    selectedTechId = tech.id;
                    document.querySelectorAll('.tech-card').forEach(c => c.classList.remove('selected'));
                    card.classList.add('selected');
                    document.getElementById('selectedName').textContent = fullName;
                    document.getElementById('submitBtn').disabled = false;
                };
                
                card.innerHTML = `
                    <div class="tech-avatar">${avatarContent}</div>
                    <h3 class="tech-name">${fullName}</h3>
                    <span class="tech-email">${profile.email}</span>
                    <p class="tech-expertise">🔧 ${tech.category || 'General Repair'}</p>
                    <div class="tech-meta">
                        <div class="meta-item">
                            <span class="material-symbols-outlined">verified</span>
                            ${tech.experience_years} Years Experience
                        </div>
                        <div class="meta-item" style="color: #22c55e;">
                            <span class="material-symbols-outlined">bolt</span>
                            Available Now
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        } catch (err) {
            grid.innerHTML = `<p style="color: red; padding: 40px;">Failed to load: ${err.message}</p>`;
        }
    }

    async function submitRepair() {
    try {
        const { data: { user } } = await db.auth.getUser();
        if (!user) { 
            alert("Please login first"); 
            window.location.href = "registration.html";
            return; 
        }
        const { error } = await db.from('repair_orders').insert([{
            technician_id: selectedTechId,
            buyer_id: user.id,
            product_id: productId, // Ensure this is the 'id' from your products table
            is_received: false,
            is_working: false,
            is_completed: false,
            is_delivered: false
        }]);

        if (error) throw error;

        // Show success UI
        document.getElementById('successOverlay').style.display = 'flex';
        
    } catch (err) {
        console.error("Submission Error:", err);
        alert("Error: " + err.message);
    }
}

    loadTechnicians();
</script>
</body>
</html>
