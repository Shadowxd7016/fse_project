<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FixKar - Select Technician</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --orange: #e67e22; --orange-light: #f39c12; --dark: #0f172a;
            --muted: #64748b; --bg: #f8f6f2; --white: #ffffff;
            --card-bg: #fffdf9; --border: #e8e0d0;
        }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--dark); min-height: 100vh; padding-bottom: 120px; }

        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1.2rem 2.5rem; background: var(--white);
            border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100;
        }
        .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.7rem; color: var(--dark); text-decoration: none; }
        .logo span { color: var(--orange); }
        .nav-links { display: flex; gap: 2.5rem; align-items: center; }
        .nav-links a { text-decoration: none; color: var(--muted); font-weight: 600; font-size: 0.95rem; }

        .page-header { max-width: 1200px; margin: 40px auto; padding: 0 2.5rem; }
        .product-pill { display: inline-block; background: var(--white); padding: 8px 20px; border-radius: 100px; border: 1px solid var(--border); margin-bottom: 15px; font-size: 0.85rem; }
        .page-title { font-family: 'Syne', sans-serif; font-size: 2.5rem; font-weight: 800; }
        .page-title span { color: var(--orange); }

        .main-content { max-width: 1200px; margin: 0 auto; padding: 0 2.5rem; }
        .tech-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }

        .tech-card {
            background: var(--card-bg); border: 2px solid var(--border);
            border-radius: 24px; padding: 30px; cursor: pointer; transition: all 0.3s ease; position: relative;
        }
        .tech-card:hover { border-color: #f5c08a; transform: translateY(-5px); }
        .tech-card.selected { border-color: var(--orange); background: #fffcf0; }
        
        /* Updated Avatar Style to handle Images */
        .tech-avatar { 
            width: 70px; height: 70px; border-radius: 20px; 
            background: var(--orange); color: white; 
            display: flex; align-items: center; justify-content: center; 
            font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.6rem; 
            margin-bottom: 20px; overflow: hidden;
        }
        .tech-avatar img {
            width: 100%; height: 100%; object-fit: cover;
        }

        .tech-name { font-family: 'Syne', sans-serif; font-size: 1.25rem; font-weight: 700; margin-bottom: 4px; }
        .tech-email { color: var(--muted); font-size: 0.85rem; margin-bottom: 12px; display: block; }
        .tech-expertise { font-weight: 700; color: var(--orange); margin-bottom: 18px; font-size: 0.95rem; }
        .tech-meta { border-top: 1px solid var(--border); padding-top: 18px; display: flex; flex-direction: column; gap: 10px; font-size: 0.85rem; color: var(--muted); }

        .submit-bar {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 95%; max-width: 1000px; background: var(--white);
            padding: 20px 45px; border-radius: 100px; border: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); z-index: 1000;
        }
        .btn-submit { background: var(--dark); color: white; border: none; padding: 14px 38px; border-radius: 100px; font-weight: 700; cursor: pointer; }
        .btn-submit:disabled { background: #e2e8f0; color: #94a3b8; cursor: not-allowed; }

        .success-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.8); display: none; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(8px); }
        .success-modal { background: white; padding: 40px; border-radius: 40px; text-align: center; max-width: 450px; width: 90%; }
    </style>
</head>
<body>

<nav>
    <a href="home.html" class="logo">Fix<span>Kar</span></a>
    <div class="nav-links">
        <a href="home.html">Home</a>
        <a href="About us.html">About Us</a>
        <a href="Contact Us.html">Contact Us</a>
    </div>
</nav>

<div class="page-header">
    <div class="product-pill">🛠️ Item: <strong id="prodName">...</strong></div>
    <h1 class="page-title">Select <span>Technician</span></h1>
</div>

<div class="main-content">
    <div class="tech-grid" id="techGrid">
        <p>Loading experts...</p>
    </div>
</div>

<div class="submit-bar">
    <div>
        <p style="font-size: 0.75rem; color: var(--muted);">SELECTED EXPERT</p>
        <strong id="selectedName">Please select above</strong>
    </div>
    <button class="btn-submit" id="submitBtn" disabled onclick="submitRepair()">Confirm Request</button>
</div>

<div class="success-overlay" id="successOverlay">
    <div class="success-modal">
        <div style="font-size: 3rem; margin-bottom: 20px;">✅</div>
        <h2 style="font-family: 'Syne'; margin-bottom: 15px;">Request Submitted</h2>
        <p style="color: var(--muted);">Your request has been sent.</p>
        <button class="btn-submit" style="margin-top: 25px; width: 100%;" onclick="window.location.href='home.html'">Back to Home</button>
    </div>
</div>

<script src="supabase_config.js"></script>
<script>
    const params = new URLSearchParams(window.location.search);
    const productId = params.get('product_id');
    const productName = params.get('product_name') || 'Item';
    document.getElementById('prodName').textContent = decodeURIComponent(productName);

    let selectedTechId = null;

    async function loadTechnicians() {
        const grid = document.getElementById('techGrid');
        
        try {
            // Fetch first_name, last_name, email, AND avatar_url from profiles
            const { data, error } = await db
                .from('technicians')
                .select(`
                    id,
                    experience_years,
                    category,
                    profiles (
                        first_name,
                        last_name,
                        email,
                        avatar_url
                    )
                `);

            if (error) throw error;

            grid.innerHTML = '';
            data.forEach(tech => {
                const profile = tech.profiles;
                const fullName = `${profile.first_name} ${profile.last_name}`;
                const initials = (profile.first_name[0] + (profile.last_name ? profile.last_name[0] : '')).toUpperCase();
                
                // Logic for Avatar Image vs Initials
                let avatarContent = initials;
                if (profile.avatar_url && profile.avatar_url.trim() !== "") {
                    avatarContent = `<img src="${profile.avatar_url}" alt="${fullName}" onerror="this.parentElement.innerHTML='${initials}'">`;
                }

                const card = document.createElement('div');
                card.className = 'tech-card';
                card.onclick = () => {
                    selectedTechId = tech.id;
                    document.querySelectorAll('.tech-card').forEach(c => c.classList.remove('selected'));
                    card.classList.add('selected');
                    document.getElementById('selectedName').textContent = fullName;
                    document.getElementById('submitBtn').disabled = false;
                };
                
                card.innerHTML = `
                    <div class="tech-avatar">${avatarContent}</div>
                    <h3 class="tech-name">${fullName}</h3>
                    <span class="tech-email">${profile.email}</span>
                    <p class="tech-expertise">🔧 ${tech.category || 'General Repair'}</p>
                    <div class="tech-meta">
                        <div>⚡ ${tech.experience_years} Years Experience</div>
                        <div style="color: #22c55e;">● Online & Available</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        } catch (err) {
            grid.innerHTML = `<p style="color: red;">Failed to load: ${err.message}</p>`;
        }
    }

    async function submitRepair() {
        try {
            const { data: { user } } = await db.auth.getUser();
            if(!user) { alert("Please login first"); return; }

            const { error } = await db.from('repair_requests').insert([{
                technician_id: selectedTechId,
                seller_id: user.id,
                product_id: productId,
                received: false,
                working: false,
                completed: false,
                delivered: false
            }]);

            if(error) throw error;
            document.getElementById('successOverlay').style.display = 'flex';
        } catch (err) {
            alert("Error: " + err.message);
        }
    }

    loadTechnicians();
</script>
</body>
</html>
