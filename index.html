<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FixKar - User Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #ffffff; font-family: sans-serif; }
        .card-shadow { box-shadow: 8px 8px 0px 0px rgba(0,0,0,1); border: 2px solid black; border-radius: 2rem; }
        .input-field { border: 1.5px solid black; border-radius: 0.75rem; padding: 0.5rem 1rem; width: 100%; outline: none; }
        .btn-black { background: black; color: white; border-radius: 9999px; padding: 0.6rem 2rem; font-weight: 600; transition: transform 0.1s; }
        .btn-black:active { transform: scale(0.95); }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="max-w-5xl mx-auto flex justify-between items-center mb-12">
        <div class="text-3xl font-bold italic text-red-600 flex items-center">
            FIX<span class="text-blue-600">KAR</span>
            <span class="ml-2 text-sm not-italic text-gray-400">⚙️</span>
        </div>
        <nav class="hidden md:flex space-x-8 font-medium">
            <a href="#" class="hover:text-blue-600">Home</a>
            <a href="#" class="hover:text-blue-600">About Us</a>
            <a href="#" class="hover:text-blue-600">Contact Us</a>
        </nav>
        <button class="btn-black text-sm">Sign in</button>
    </header>

    <main class="max-w-4xl mx-auto space-y-10">

        <section class="card-shadow p-8 bg-white">
            <h2 class="text-xl font-bold mb-6 flex items-center">
                <i class="far fa-user mr-3"></i> Update Profile
            </h2>
            <div class="flex flex-col md:flex-row gap-8">
                <div class="flex flex-col items-center space-y-4">
                    <div class="w-32 h-32 bg-gray-100 rounded-full border-2 border-black flex items-center justify-center">
                        <i class="fas fa-user text-5xl text-gray-400"></i>
                    </div>
                    <button class="border border-black rounded-full px-4 py-1 text-xs font-bold uppercase">Select Photo</button>
                </div>
                <div class="flex-1 grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-bold uppercase ml-1">First Name</label>
                        <input type="text" placeholder="First Name" class="input-field text-sm">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold uppercase ml-1">Last Name</label>
                        <input type="text" placeholder="Last Name" class="input-field text-sm">
                    </div>
                    <div class="md:col-span-2">
                        <label class="text-[10px] font-bold uppercase ml-1">Email Address</label>
                        <input type="email" placeholder="Email" class="input-field text-sm">
                    </div>
                    <div class="md:col-span-2">
                        <label class="text-[10px] font-bold uppercase ml-1">New Password</label>
                        <input type="password" placeholder="New Password" class="input-field text-sm">
                    </div>
                </div>
            </div>
            <div class="flex justify-end mt-6">
                <button class="btn-black text-sm">Save Changes</button>
            </div>
        </section>

        <section class="card-shadow p-8 bg-white relative">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold flex items-center">
                    <i class="fas fa-plus mr-3"></i> My Ads
                </h2>
                <span class="bg-black text-white text-[10px] px-3 py-1 rounded-full font-bold">3 ADS</span>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                <div class="border-2 border-black rounded-2xl p-4 relative overflow-hidden">
                    <div class="absolute top-2 right-2 flex space-x-1">
                        <div class="w-6 h-4 border border-black rounded-sm"></div>
                        <div class="w-6 h-4 border border-black bg-red-500 rounded-sm"></div>
                    </div>
                    <div class="text-3xl mb-4">🪑</div>
                    <h3 class="font-bold text-sm">Wooden Chair</h3>
                    <p class="text-xs text-gray-600">Rs 1,000</p>
                </div>
                <div class="border-2 border-black rounded-2xl p-4 relative overflow-hidden">
                    <div class="absolute top-2 right-2 flex space-x-1">
                        <div class="w-6 h-4 border border-black rounded-sm"></div>
                        <div class="w-6 h-4 border border-black bg-red-500 rounded-sm"></div>
                    </div>
                    <div class="text-3xl mb-4">📱</div>
                    <h3 class="font-bold text-sm">Mobile Screen</h3>
                    <p class="text-xs text-gray-600">Rs 5,000</p>
                </div>
                <div class="border-2 border-black rounded-2xl p-4 relative overflow-hidden">
                    <div class="absolute top-2 right-2 flex space-x-1">
                        <div class="w-6 h-4 border border-black rounded-sm"></div>
                        <div class="w-6 h-4 border border-black bg-red-500 rounded-sm"></div>
                    </div>
                    <div class="text-3xl mb-4 text-blue-300">❄️</div>
                    <h3 class="font-bold text-sm">Fridge</h3>
                    <p class="text-xs text-gray-600">Rs 10,000</p>
                </div>
            </div>
        </section>

        <section class="card-shadow p-8 bg-white">
            <h2 class="text-xl font-bold mb-6 flex items-center">
                <i class="fas fa-upload mr-3"></i> Upload Ad
            </h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4">
                <div class="col-span-1">
                    <label class="text-[10px] font-bold uppercase ml-1">Title</label>
                    <input type="text" placeholder="e.g. Wooden Chair" class="input-field text-sm">
                </div>
                <div>
                    <label class="text-[10px] font-bold uppercase ml-1">Price (RS)</label>
                    <input type="number" placeholder="1000" class="input-field text-sm">
                </div>
                <div>
                    <label class="text-[10px] font-bold uppercase ml-1">Category</label>
                    <select class="input-field text-sm bg-white"><option>Select Category</option></select>
                </div>
                <div>
                    <label class="text-[10px] font-bold uppercase ml-1">Condition</label>
                    <select class="input-field text-sm bg-white"><option>Select Condition</option></select>
                </div>
            </div>
            <div class="mb-6">
                <label class="text-[10px] font-bold uppercase ml-1">Description</label>
                <textarea rows="4" placeholder="Describe your item..." class="input-field text-sm"></textarea>
            </div>

            <div class="border border-gray-200 rounded-2xl p-6 bg-gray-50/50 mb-6">
                <p class="text-[10px] font-bold uppercase mb-3 flex items-center">
                    <i class="fas fa-map-marker-alt mr-2"></i> Location Details
                </p>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-3 items-end">
                    <input type="text" placeholder="Province" class="input-field text-sm bg-white">
                    <input type="text" placeholder="City" class="input-field text-sm bg-white">
                    <input type="text" placeholder="Area" class="input-field text-sm bg-white">
                    <button class="input-field text-sm bg-white font-bold flex items-center justify-center">
                        <i class="fas fa-crosshairs mr-2"></i> Detect
                    </button>
                </div>
            </div>

            <div class="border-2 border-dashed border-black rounded-2xl p-10 flex flex-col items-center justify-center bg-white mb-6">
                <div class="w-12 h-12 rounded-full border border-black flex items-center justify-center mb-2">
                    <i class="fas fa-upload"></i>
                </div>
                <p class="text-[10px] font-bold uppercase">Click to upload photos</p>
                <p class="text-[8px] text-gray-500 uppercase">PNG, JPG up to 10MB</p>
            </div>

            <div class="flex justify-end">
                <button class="btn-black text-sm flex items-center">
                    Publish Ad <i class="fas fa-paper-plane ml-2 text-xs"></i>
                </button>
            </div>
        </section>

    </main>

    <footer class="h-20"></footer>
</body>
</html>
