<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FixKar | Professional Technician Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase_config.js"></script>
    <script src="tech_dashboard.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
        
        /* Matching the rounded black border style from your image */
        .fixkar-card {
            background: white;
            border: 2px solid black;
            border-radius: 1.5rem;
            box-shadow: 6px 6px 0px 0px rgba(0,0,0,1);
            transition: all 0.2s ease;
        }
        .fixkar-card:hover {
            transform: translate(-2px, -2px);
            box-shadow: 8px 8px 0px 0px rgba(0,0,0,1);
        }
    </style>
</head>
<body class="pb-12">

    <header class="bg-white border-b-2 border-black sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <div class="flex items-center space-x-8">
                <img src="Picture1.png" alt="FixKar Logo" class="h-12 w-auto">
            </div>
            <div class="flex items-center space-x-4">
                <nav class="hidden md:flex space-x-6 font-bold text-gray-800">
                    <a href="index.html" class="hover:text-red-600 transition">Home</a>
                    <a href="About Us.html" class="hover:text-red-600 transition">About Us</a>
                    <a href="Contact Us.html" class="hover:text-red-600 transition">Contact Us</a>
                </nav>
                    <a href="index.html" class="flex items-center group">
                        <div class="w-11 h-11 rounded-full border-2 border-black overflow-hidden group-hover:translate-y-[-2px] transition-transform">
                            <img id="user-avatar-nav" src="https://ui-avatars.com/api/?name=User&background=000&color=fff" alt="Profile" class="w-full h-full object-cover">
                        </div>
                    </a>
                </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 mt-10">
        
        <div class="mb-10">
            <h1 class="text-4xl font-extrabold text-gray-900 italic">Welcome back!</h1>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-12">
            <div class="fixkar-card p-8">
                <p class="text-sm font-bold text-gray-400 uppercase tracking-widest">Account Status</p>
                <h3 id="tech-status" class="text-2xl font-black mt-2">Checking...</h3>
            </div>

            <div class="fixkar-card p-8">
                <p class="text-sm font-bold text-gray-400 uppercase tracking-widest">Active Orders</p>
                <h3 class="text-3xl font-black mt-2">0</h3>
            </div>
        </div>

        <section>
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-black italic underline decoration-red-600 underline-offset-8">Available Products & Tools</h2>
                <button class="text-sm font-bold hover:text-red-600 transition">View All <i class="fa fa-arrow-right ml-1"></i></button>
            </div>
            
            <div id="product-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
                <div class="animate-pulse text-gray-400 font-bold">Loading Inventory...</div>
            </div>
        </section>

    </main>

</body>
</html>
