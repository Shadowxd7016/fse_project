<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FixKar - Product Detail</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --orange: #e67e22;
            --orange-light: #f39c12;
            --dark: #0f172a;
            --mid: #1e293b;
            --muted: #64748b;
            --bg: #f8f6f2;
            --white: #ffffff;
            --card-bg: #fffdf9;
            --border: #e8e0d0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--dark);
            min-height: 100vh;
        }

        /* ── NAVBAR ── */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2.5rem;
            background: var(--white);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.7rem;
            background: linear-gradient(135deg, var(--orange), var(--orange-light));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .nav-links { display: flex; gap: 2rem; align-items: center; }
        .nav-links a {
            text-decoration: none;
            color: var(--muted);
            font-weight: 500;
            font-size: 0.95rem;
            transition: color 0.2s;
        }
        .nav-links a:hover { color: var(--orange); }
        .nav-auth-btn {
            background: var(--dark);
            color: white;
            border: none;
            padding: 9px 22px;
            border-radius: 100px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .nav-auth-btn:hover { background: var(--orange); }

        /* ── BACK LINK ── */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--orange);
            font-weight: 600;
            text-decoration: none;
            font-size: 0.95rem;
            margin: 24px 0 0 2.5rem;
            transition: gap 0.2s;
        }
        .back-link:hover { gap: 10px; }

        /* ── PRODUCT LAYOUT ── */
        .product-wrapper {
            max-width: 1200px;
            margin: 24px auto 60px;
            padding: 0 2.5rem;
        }

        .product-card {
            background: var(--card-bg);
            border-radius: 28px;
            border: 1px solid var(--border);
            box-shadow: 0 24px 48px -12px rgba(0,0,0,0.08);
            display: flex;
            overflow: hidden;
            min-height: 480px;
        }

        /* Image panel */
        .product-image-panel {
            flex: 1.1;
            background: linear-gradient(145deg, #fef3e2, #fde8c4);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 48px 32px;
            position: relative;
            overflow: hidden;
        }
        .product-image-panel::after {
            content: '';
            position: absolute;
            width: 300px; height: 300px;
            border-radius: 50%;
            background: rgba(230,126,34,0.07);
            bottom: -80px; right: -80px;
        }
        .product-image-panel img {
            max-width: 100%;
            max-height: 340px;
            object-fit: contain;
            position: relative;
            z-index: 1;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.12));
            transition: transform 0.4s ease;
        }
        .product-image-panel:hover img { transform: scale(1.04) translateY(-4px); }

        /* Info panel */
        .product-info-panel {
            flex: 1.4;
            padding: 48px 44px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .product-category {
            display: inline-block;
            background: #fff3e0;
            color: var(--orange);
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 5px 14px;
            border-radius: 100px;
            margin-bottom: 16px;
        }
        .product-title {
            font-family: 'Syne', sans-serif;
            font-size: 2.4rem;
            font-weight: 800;
            line-height: 1.15;
            color: var(--dark);
            margin-bottom: 16px;
        }
        .product-price {
            font-family: 'Syne', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--orange);
            margin-bottom: 20px;
        }
        .product-desc {
            font-size: 1rem;
            line-height: 1.75;
            color: var(--muted);
            margin-bottom: 36px;
        }

        /* ── ACTION BUTTONS ── */
        .action-buttons {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
        }

        .btn-repair {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(110deg, var(--orange), var(--orange-light));
            color: white;
            border: none;
            padding: 15px 28px;
            border-radius: 100px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(230,126,34,0.3);
            transition: all 0.25s ease;
            text-decoration: none;
        }
        .btn-repair:hover {
            transform: translateY(-3px);
            box-shadow: 0 16px 28px rgba(230,126,34,0.4);
        }
        .btn-repair .icon { font-size: 1.15rem; }

        .btn-message {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--white);
            color: var(--dark);
            border: 2px solid var(--border);
            padding: 13px 28px;
            border-radius: 100px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.25s ease;
            text-decoration: none;
        }
        .btn-message:hover {
            border-color: var(--orange);
            color: var(--orange);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.07);
        }
        .btn-message .icon { font-size: 1.15rem; }

        /* ── SELLER STRIP ── */
        .seller-strip {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-top: 36px;
            padding-top: 28px;
            border-top: 1px solid var(--border);
        }
        .seller-avatar {
            width: 44px; height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--orange), var(--orange-light));
            display: flex; align-items: center; justify-content: center;
            color: white;
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.1rem;
            flex-shrink: 0;
        }
        .seller-info p { font-size: 0.8rem; color: var(--muted); margin-bottom: 2px; }
        .seller-info strong { font-size: 0.95rem; color: var(--dark); font-weight: 600; }

        /* ── LOADING / ERROR ── */
        .loading-state {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 60px;
            color: var(--muted);
            font-size: 1rem;
        }

        /* ── TOAST ── */
        .toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--dark);
            color: white;
            padding: 13px 26px;
            border-radius: 100px;
            font-weight: 500;
            font-size: 0.9rem;
            z-index: 9999;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            white-space: nowrap;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ── FOOTER ── */
        footer {
            background: var(--dark);
            color: #94a3b8;
            padding: 48px 2.5rem 24px;
        }
        .footer-inner {
            max-width: 1200px;
            margin: auto;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 28px;
        }
        .footer-logo {
            font-family: 'Syne', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--orange-light);
            display: block;
            margin-bottom: 8px;
        }
        .footer-section h4 {
            font-family: 'Syne', sans-serif;
            color: var(--white);
            margin-bottom: 14px;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        .footer-section a {
            display: block;
            color: #64748b;
            text-decoration: none;
            margin: 7px 0;
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        .footer-section a:hover { color: var(--orange-light); }
        .footer-bottom {
            text-align: center;
            margin-top: 36px;
            font-size: 0.8rem;
            color: #334155;
        }

        @media (max-width: 768px) {
            .product-card { flex-direction: column; }
            .product-image-panel { padding: 36px 24px; }
            .product-info-panel { padding: 32px 24px; }
            .product-title { font-size: 1.8rem; }
            nav { padding: 1rem 1.25rem; }
            .back-link { margin-left: 1.25rem; }
            .product-wrapper { padding: 0 1.25rem; }
        }
    </style>
</head>
<body>

<nav>
    <span class="logo">FixKar</span>
    <div class="nav-links">
        <a href="home.html">Home</a>
        <a href="About us.html">About Us</a>
        <a href="Contact Us.html">Contact Us</a>
        <button class="nav-auth-btn" id="auth-btn">Sign In</button>
    </div>
</nav>

<a href="home.html" class="back-link">← Back to Home</a>

<div class="product-wrapper">
    <div class="product-card" id="productCard">
        <div class="loading-state" id="loadingState">Loading product…</div>
    </div>
</div>

<div class="toast" id="toast"></div>

<footer>
    <div class="footer-inner">
        <div class="footer-section">
            <span class="footer-logo">FixKar</span>
            <p style="font-size:0.85rem;">Buy, Sell & Repair — easily.</p>
            <div style="margin-top:12px; display:flex; gap:14px;">
                <a href="#">Facebook</a>
                <a href="#">Instagram</a>
                <a href="#">Twitter</a>
            </div>
        </div>
        <div class="footer-section">
            <h4>Categories</h4>
            <a href="#">Electronics</a>
            <a href="#">Clothing</a>
            <a href="#">Others</a>
        </div>
        <div class="footer-section">
            <h4>Company</h4>
            <a href="#">About Us</a>
            <a href="#">Contact Us</a>
        </div>
    </div>
    <p class="footer-bottom">© 2026 FixKar. All rights reserved.</p>
</footer>

<script src="supabase_config.js"></script>
<script src="navbar.js"></script>
<script>
    // ── helpers ──
    function getParam(key) {
        return new URLSearchParams(window.location.search).get(key);
    }
    function showToast(msg, error = false) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.style.background = error ? '#c2410c' : '#0f172a';
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2800);
    }

    // ── load product ──
    async function loadProduct() {
        const id = getParam('id');
        let product = null;

        // 1. try Supabase
        try {
            if (window.supabaseClient) {
                const { data, error } = await window.supabaseClient
                    .from('products')
                    .select('*')
                    .eq('id', id)
                    .single();
                if (!error && data) product = data;
            }
        } catch (_) {}

        // 2. try localStorage
        if (!product) {
            try {
                const stored = localStorage.getItem('market_products');
                if (stored && id) {
                    const list = JSON.parse(stored);
                    product = list.find(p => String(p.id) === String(id));
                }
            } catch (_) {}
        }

        // 3. fallback demo
        if (!product) {
            product = {
                id: id || 'p1001',
                name: 'Samsung Galaxy S23 Ultra',
                category: 'Smartphones',
                price: '₨ 289,999',
                description: 'Dynamic AMOLED 2X display, 200MP quad-camera system, Snapdragon 8 Gen 2 chipset, and 5,000mAh battery. This flagship device is built for power users who demand the very best. Whether it\'s screen damage, battery issues, or motherboard repair — our certified technicians have you covered.',
                image: 'https://placehold.co/600x500/fde8c4/e67e22?text=Galaxy+S23+Ultra',
                seller_name: 'Ahmed Raza',
                seller_id: 'S-4421'
            };
        }

        renderProduct(product);
    }

    function renderProduct(p) {
        const card = document.getElementById('productCard');
        const initials = (p.seller_name || 'Seller').split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);
        const productId = encodeURIComponent(p.id);

        card.innerHTML = `
            <div class="product-image-panel">
                <img src="${p.image || 'https://placehold.co/600x500?text=Product'}" alt="${p.name}">
            </div>
            <div class="product-info-panel">
                ${p.category ? `<span class="product-category">${p.category}</span>` : ''}
                <h1 class="product-title">${p.name}</h1>
                <div class="product-price">${p.price}</div>
                <p class="product-desc">${p.description}</p>

                <div class="action-buttons">
                    <!-- REQUEST REPAIR: passes product id via URL to select-technician.html -->
                    <a href="select-technician.html?product_id=${productId}&product_name=${encodeURIComponent(p.name)}"
                       class="btn-repair">
                        <span class="icon">🔧</span> Request Repair
                    </a>

                    <!-- MESSAGE SELLER: passes product id via URL to message.html -->
                    <a href="conversation.html?id=${productId}"
                       class="btn-message">
                        <span class="icon">💬</span> Message Seller
                    </a>
                </div>

                <div class="seller-strip">
                    <div class="seller-avatar">${initials}</div>
                    <div class="seller-info">
                        <p>Listed by</p>
                        <strong>${p.seller_name || 'Unknown Seller'}</strong>
                    </div>
                </div>
            </div>
        `;
    }

    loadProduct();
</script>
</body>
</html>
