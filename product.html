<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FixKar | Product Details</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400" rel="stylesheet"/>

    <style>
        :root { --red: #ef4444; --dark: #0f172a; --gray-50: #f9fafb; --border: #f3f4f6; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--gray-50); color: var(--dark); }
        
        .btn-primary { 
            background-color: var(--dark); color: white; padding: 12px 24px; border-radius: 12px; 
            font-weight: 700; display: inline-flex; align-items: center; gap: 8px; 
            transition: 0.2s; cursor: pointer; border: none; text-decoration: none;
        }
        .btn-primary:hover { background-color: var(--red); transform: translateY(-2px); }
        
        .btn-secondary { 
            background-color: white; color: var(--dark); border: 2px solid var(--border); 
            padding: 12px 24px; border-radius: 12px; font-weight: 700; 
            display: inline-flex; align-items: center; gap: 8px; transition: 0.2s; 
            cursor: pointer; text-decoration: none; 
        }
        .btn-secondary:hover { border-color: var(--red); color: var(--red); }
        
        .badge { background-color: var(--border); color: var(--dark); padding: 4px 12px; border-radius: 6px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; }
        .price-text { color: var(--red); font-size: 2.25rem; font-weight: 800; }
        .image-container { background: white; border-radius: 24px; overflow: hidden; border: 1px solid var(--border); aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <nav class="bg-white border-b border-gray-100 py-4 px-6 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h2 class="text-2xl font-bold italic tracking-tighter cursor-pointer" onclick="window.location.href='home.html'">
                Fix<span class="text-red-500">Kar</span>
            </h2>
            <div class="hidden md:flex items-center gap-8 text-sm font-semibold text-gray-600">
                <a href="home.html" class="hover:text-red-500">Home</a>
                <a href="About us.html" class="hover:text-red-500">About Us</a>
                <button class="bg-gray-900 text-white px-5 py-2 rounded-full hover:bg-red-500">Sign In</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <a href="home.html" class="flex items-center text-gray-400 font-semibold mb-8 hover:text-red-500 transition-colors text-sm no-underline">
            <span class="material-symbols-outlined mr-1">arrow_back</span> Back to Marketplace
        </a>

        <div id="product-detail-layout" class="grid grid-cols-1 lg:grid-cols-2 gap-12">
            <div class="col-span-full text-center py-20 text-gray-400 font-bold animate-pulse">Loading product details...</div>
        </div>
    </main>

    <script src="supabase_config.js"></script>
    <script>
        async function fetchProduct() {
            const params = new URLSearchParams(window.location.search);
            const productId = params.get('id');
            if (!productId) { renderError("No product selected."); return; }

            try {
                // 1. Fetch Product
                const { data: product, error: pError } = await db
                    .from('products')
                    .select('*')
                    .eq('id', productId)
                    .single();
                if (pError || !product) throw new Error("Product not found");

                // 2. Attempt to fetch Seller Name (using a separate call to avoid Join errors)
                let sellerName = "Verified Seller";
                if (product.user_id) {
                    try {
                        const { data: profile } = await db
                            .from('profiles') // Adjust if your table is named 'users'
                            .select('first_name,last_name') 
                            .eq('id', product.user_id)
                            .single();
                        
                        if (profile && profile.first_name) {
                            sellerName = profile.first_name + ' ' + profile.last_name;   
                        }
                    } catch (e) {
                        console.warn("Could not fetch seller profile name:", e);
                    }
                }

                renderProduct(product, sellerName);
            } catch (err) {
                console.error("Fetch Error:", err);
                renderError("Product not found or database error.");
            }
        }

        function renderProduct(p, sellerName) {
            const layout = document.getElementById('product-detail-layout');
            const imageUrl = (p.image_urls && p.image_urls.length > 0) ? p.image_urls[0] : 'https://via.placeholder.com/600';
            
            layout.innerHTML = `
                <div class="image-container shadow-xl shadow-gray-200/50">
                    <img src="${imageUrl}" alt="${p.title}" class="w-full h-full object-cover">
                </div>

                <div class="flex flex-col justify-center">
                    <div class="flex gap-2 mb-4">
                        <span class="badge">${p.category || 'Electronics'}</span>
                        <span class="badge" style="background:#fee2e2; color:#ef4444;">${p.condition || 'Used'}</span>
                    </div>

                    <h1 class="text-4xl md:text-5xl font-extrabold text-gray-900 mb-2 leading-tight">${p.title}</h1>
                    
                    <div class="flex items-center gap-2 mb-6 text-gray-500 font-medium">
                        <div class="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center text-xs font-bold text-gray-600">
                            ${sellerName.charAt(0).toUpperCase()}
                        </div>
                        <span>Listed by <span class="text-gray-900 font-bold">${sellerName}</span></span>
                    </div>

                    <div class="price-text mb-6">Rs. ${Number(p.price || 0).toLocaleString()}</div>

                    <div class="bg-white p-6 rounded-2xl border border-gray-100 mb-8">
                        <h4 class="text-xs font-bold uppercase tracking-widest text-gray-400 mb-2">Description</h4>
                        <p class="text-gray-600 leading-relaxed text-sm md:text-base">${p.description || 'No description provided.'}</p>
                    </div>

                    <div class="flex flex-col sm:flex-row gap-4">
                        <a href="select-technician.html?product_id=${p.id}&product_name=${encodeURIComponent(p.title)}" class="btn-primary">
                            <span class="material-symbols-outlined">build</span> Request Repair
                        </a>
                        <a href="conversation.html?id=${p.id}" class="btn-secondary">
                            <span class="material-symbols-outlined">chat_bubble</span> Message Seller
                        </a>
                    </div>
                </div>
            `;
        }

        function renderError(msg) {
            document.getElementById('product-detail-layout').innerHTML = `
                <div class="col-span-full text-center py-20">
                    <p class="text-gray-500 mb-6 font-bold text-xl">${msg}</p>
                    <a href="home.html" class="btn-primary">Go Back Home</a>
                </div>`;
        }

        document.addEventListener('DOMContentLoaded', fetchProduct);
    </script>
</body>
</html>
