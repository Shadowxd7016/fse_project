<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversation | Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        .chat-container::-webkit-scrollbar { width: 6px; }
        .chat-container::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
        .msg-enter { animation: fadeSlideIn 0.2s ease-out; }
        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col">

    <header class="mx-auto flex justify-between items-center w-full bg-white" style="border-bottom: 0.8px solid black; padding: 0.5rem 2rem;">
        <div class="flex items-center">
            <img src="Picture1.png" alt="logo" class="w-24 h-auto">
        </div>
        <div class="flex items-center space-x-8">
            <nav class="hidden md:flex space-x-8 font-medium">
                <a href="home.html" class="hover:text-blue-600">Home</a>
                <a href="About Us.html" class="hover:text-blue-600">About Us</a>
            </nav>
            <button id="auth-btn" class="btn-black bg-black text-white px-4 py-1 rounded text-sm" onclick="handleLogout()">Logout</button>
        </div>
    </header>

    <main class="flex flex-1 overflow-hidden">
        
        <!-- ── LEFT PANEL: exactly as original ── -->
        <section class="w-1/3 border-r border-gray-200 bg-white p-6 overflow-y-auto flex flex-col items-center">
            <div id="product-display" class="w-full">
                <h2 class="text-xl font-bold mb-4">Item Details</h2>
                
                <div class="rounded-lg overflow-hidden border border-gray-100 shadow-sm mb-6">
                    <div id="image-container" class="w-full mb-6">
                        <div class="rounded-lg overflow-hidden border border-gray-100 shadow-sm mb-2">
                            <img id="product-img" src="https://picsum.photos/400/300" alt="Product" class="w-full h-64 object-cover">
                        </div>
                        <div id="thumbnail-grid" class="flex gap-2 overflow-x-auto pb-2 chat-container"></div>
                    </div>
                </div>

                <div class="mb-6">
                    <p class="text-sm text-gray-500">Product ID:</p>
                    <p id="display-id" class="text-lg font-mono font-bold text-blue-600">Loading...</p>
                </div>

                <hr class="mb-6">

                <div class="flex items-center space-x-4">
                    <img id="seller-img" src="https://via.placeholder.com/60" alt="Seller" class="w-16 h-16 rounded-full border-2 border-red-500">
                    <div>
                        <h3 class="font-bold text-gray-800" id="seller-name">Seller Name</h3>
                    </div>
                </div>
            </div>
        </section>

        <!-- ── RIGHT PANEL: chat ── -->
        <section class="flex-1 flex flex-col bg-gray-100">

            <div id="chat-messages" class="flex-1 p-6 overflow-y-auto chat-container space-y-4">
                <div id="chat-loader" class="flex justify-center items-center h-full">
                    <p class="text-gray-400 text-sm">Loading messages...</p>
                </div>
            </div>

            <!-- Own-listing banner (hidden by default, shown if seller visits own product) -->
            <div id="own-listing-banner" class="hidden px-4 py-3 bg-yellow-50 border-t border-yellow-200 text-center text-sm text-yellow-700">
                This is your listing — you can't message yourself.
            </div>

            <div id="input-bar" class="p-4 bg-white border-t border-gray-200">
                <div class="flex space-x-4">
                    <input
                        id="msg-input"
                        type="text"
                        placeholder="Type your message..."
                        class="flex-1 border border-gray-300 rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                        onkeydown="if(event.key==='Enter') sendMessage()"
                        disabled
                    >
                    <button
                        id="send-btn"
                        onclick="sendMessage()"
                        disabled
                        class="bg-black text-white px-6 py-2 rounded-full font-medium hover:bg-gray-800 transition disabled:opacity-40 disabled:cursor-not-allowed"
                    >Send</button>
                </div>
            </div>
        </section>
    </main>

<script src="supabase_config.js"></script>
<script>
let currentUser    = null;
let conversationId = null;
let sellerId       = null;
let isBuyer        = true;
let realtimeSub    = null;

const renderedIds = new Set();

window.onload = async function () {
    const params = new URLSearchParams(window.location.search);

    const productId = params.get("id");
    const conversationParam = params.get("conversation_id");

    const { data: { user } } = await db.auth.getUser();
    if (!user) {
        window.location.href = "registration.html";
        return;
    }

    currentUser = user;

    // ───────────── CASE 1: conversation_id ─────────────
    if (conversationParam) {
        const { data: conv, error } = await db
            .from('conversations')
            .select('*')
            .eq('id', conversationParam)
            .single();

        if (error || !conv) {
            alert("Conversation not found");
            return;
        }

        // Security check
        if (currentUser.id !== conv.buyer_id && currentUser.id !== conv.seller_id) {
            alert("Unauthorized");
            return;
        }

        conversationId = conv.id;
        sellerId = conv.seller_id;
        isBuyer = currentUser.id === conv.buyer_id;

        await loadProduct(conv.product_id);

        await loadMessages();
        subscribeToMessages();
        enableChat();
        return;
    }

    // ───────────── CASE 2: product_id ─────────────
    if (productId) {
        const product = await loadProduct(productId);
        if (!product) return;

        sellerId = product.user_id;

        // ❌ Block seller messaging own product
        if (currentUser.id === sellerId) {
            blockOwnListing();
            return;
        }

        isBuyer = true;

        conversationId = await getOrCreateConversation(productId, sellerId);
    let currentUser    = null;
    let conversationId = null;
    let sellerId       = null;
    let isBuyer        = true;
    let realtimeSub    = null;

const renderedIds = new Set();

window.onload = async function () {
    const params = new URLSearchParams(window.location.search);

    const productId = params.get("id");
    const conversationParam = params.get("conversation_id");

    const { data: { user } } = await db.auth.getUser();
    if (!user) {

    if (conversationParam) {

            .eq('id', conversationParam)
            .single();

        if (error || !conv) {
            alert("Conversation not found");
            return;
        }

        // Security check
        if (currentUser.id !== conv.buyer_id && currentUser.id !== conv.seller_id) {
            alert("Unauthorized");
            return;
        }

        conversationId = conv.id;
        sellerId = conv.seller_id;
        isBuyer = currentUser.id === conv.buyer_id;

        await loadProduct(conv.product_id);

        await loadMessages();
        subscribeToMessages();
        enableChat();
        return;
    }

    // ───────────── CASE 2: product_id ─────────────
    if (productId) {
        const product = await loadProduct(productId);
        if (!product) return;

        sellerId = product.user_id;

        // ❌ Block seller messaging own product
        if (currentUser.id === sellerId) {
            blockOwnListing();
            return;
        }

        isBuyer = true;

        conversationId = await getOrCreateConversation(productId, sellerId);
        if (!conversationId) return;

        await loadMessages();
        subscribeToMessages();
        enableChat();
        return;
    }

    alert("Invalid URL");
};

// ─────────────────────────────
// LOAD PRODUCT
// ─────────────────────────────
async function loadProduct(productId) {
    const { data, error } = await db
        .from('products')
        .select(`*, profiles (first_name,last_name,avatar_url)`)
        .eq('id', productId)
        .single();

    if (error) {
        console.error(error);
        return null;
    }

    displayProduct(data, data.profiles);
    return data;
}
function displayProduct(product, seller) {
    // Product ID
    document.getElementById('display-id').innerText = "#" + product.id;

    // Images
    const mainImg = document.getElementById('product-img');
    const thumbGrid = document.getElementById('thumbnail-grid');
    thumbGrid.innerHTML = '';

    const images = product.image_urls || [];

    if (images.length > 0) {
        mainImg.src = images[0];

        images.forEach(url => {
            const thumb = document.createElement('img');
            thumb.src = url;
            thumb.className =
                "w-16 h-16 object-cover rounded border cursor-pointer hover:border-blue-500";

            thumb.onclick = () => {
                mainImg.src = url;
            };

            thumbGrid.appendChild(thumb);
        });
    } else {
        mainImg.src = "https://picsum.photos/400/300";
    }

    // Seller info
    if (seller) {
        document.getElementById('seller-img').src =
            seller.avatar_url || "https://picsum.photos/60";

        const fullName = `${seller.first_name || ''} ${seller.last_name || ''}`.trim();

        document.getElementById('seller-name').innerText =
            fullName || "Unknown Seller";
    }
}
// ─────────────────────────────
// GET OR CREATE CONVERSATION
// ─────────────────────────────
async function getOrCreateConversation(productId, sellerUid) {
    const buyerUid = currentUser.id;

    const { data: existing } = await db
        .from('conversations')
        .select('id')
        .eq('product_id', productId)
        .eq('buyer_id', buyerUid)
        .eq('seller_id', sellerUid)
        .maybeSingle();

    if (existing) return existing.id;

    const { data, error } = await db
        .from('conversations')
        .insert({
            product_id: productId,
            buyer_id: buyerUid,
            seller_id: sellerUid
        })
        .select('id')
        .single();

    if (error) {
        console.error(error);
        return null;
    }

    return data.id;
}

// ─────────────────────────────
// LOAD MESSAGES
// ─────────────────────────────
async function loadMessages() {
    const { data: messages } = await db
        .from('messages')
        .select('*')
        .eq('conversation_id', conversationId)
        .order('created_at', { ascending: true });

    const container = document.getElementById('chat-messages');
    container.innerHTML = '';

    if (!messages || messages.length === 0) {
        container.innerHTML = `<p class="text-center text-gray-400 text-sm mt-8">No messages yet 👋</p>`;
        return;
    }

    messages.forEach(msg => {
        renderedIds.add(msg.id);
        appendMessage(msg, false);
    });

    scrollToBottom();
}

// ─────────────────────────────
// REALTIME
// ─────────────────────────────
function subscribeToMessages() {
    realtimeSub = db
        .channel(`messages:${conversationId}`)
        .on('postgres_changes', {
            event: 'INSERT',
            schema: 'public',
            table: 'messages',
            filter: `conversation_id=eq.${conversationId}`
        }, payload => {
            const msg = payload.new;

            if (renderedIds.has(msg.id)) return;
            renderedIds.add(msg.id);

            appendMessage(msg, true);
            scrollToBottom();
        })
        .subscribe();
}

// ─────────────────────────────
// SEND MESSAGE
// ─────────────────────────────
async function sendMessage() {
    const input = document.getElementById('msg-input');
    const content = input.value.trim();

    if (!content || !conversationId) return;

    input.value = '';
    document.getElementById('send-btn').disabled = true;

    const { data, error } = await db
        .from('messages')
        .insert({
            conversation_id: conversationId,
            content,
            is_buyer: isBuyer
        })
        .select('id')
        .single();

    document.getElementById('send-btn').disabled = false;

    if (error) {
        alert("Failed to send");
        input.value = content;
        return;
    }

    renderedIds.add(data.id);

    appendMessage({
        ...data,
        content,
        is_buyer: isBuyer,
        created_at: new Date().toISOString()
    }, true);

    scrollToBottom();
}

// ─────────────────────────────
// UI HELPERS
// ─────────────────────────────
function enableChat() {
    document.getElementById('msg-input').disabled = false;
    document.getElementById('send-btn').disabled = false;
}

function blockOwnListing() {
    document.getElementById('chat-messages').innerHTML =
        `<p class="text-center text-gray-400 text-sm mt-8">You cannot message yourself</p>`;
    document.getElementById('input-bar').classList.add('hidden');
    document.getElementById('own-listing-banner').classList.remove('hidden');
}

function appendMessage(msg, animate) {
    const container = document.getElementById('chat-messages');

    const sentByMe = (isBuyer && msg.is_buyer) || (!isBuyer && !msg.is_buyer);

    const div = document.createElement('div');
    div.className = `flex ${sentByMe ? 'justify-end' : 'justify-start'} ${animate ? 'msg-enter' : ''}`;

    div.innerHTML = `
        <div class="${sentByMe ? 'bg-blue-600 text-white' : 'bg-white'} px-4 py-2 rounded-2xl max-w-xs">
            ${escapeHtml(msg.content)}
        </div>
    `;

    container.appendChild(div);
}

function scrollToBottom() {
    const c = document.getElementById('chat-messages');
    c.scrollTop = c.scrollHeight;
}

function escapeHtml(str) {
    return str.replace(/[&<>"']/g, tag => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[tag]));
}

function handleLogout() {
    if (realtimeSub) db.removeChannel(realtimeSub);
    db.auth.signOut().then(() => {
        window.location.href = "login.html";
    });
}

        document.getElementById('msg-input').disabled = false;
        document.getElementById('send-btn').disabled  = false;
        document.getElementById('msg-input').focus();
    };

    async function getOrCreateConversation(productId, sellerUid) {
        const buyerId      = currentUser.id; // always the buyer here (seller blocked above)
        const realSellerId = sellerUid;

        const { data: existing, error: fetchErr } = await db
            .from('conversations')
            .select('id')
            .eq('product_id', productId)
            .eq('buyer_id',   buyerId)
            .eq('seller_id',  realSellerId)
            .maybeSingle();

        if (fetchErr) { console.error("Conversation fetch error:", fetchErr); return null; }
        if (existing)   return existing.id;

        const { data: created, error: createErr } = await db
            .from('conversations')
            .insert({ product_id: productId, buyer_id: buyerId, seller_id: realSellerId })
            .select('id')
            .single();

        if (createErr) { console.error("Conversation create error:", createErr); return null; }
        return created.id;
    }

    alert("Invalid URL");
};
