<style>
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  #cursor {
    display: inline-block;
    width: 3px;
    height: 0.9em;
    background: #000000; /* match your primary color */
    margin-left: 2px;
    vertical-align: text-center;
    animation: blink 0.7s step-end infinite;
    border-radius: 1px;
  }
  .hero-img {
    border-radius: 1rem;

    width: 100%;
    object-fit: cover;
    transition: transform 0.5s ease;

  .img-wrap-a:hover .hero-img { transform: rotate(0deg) !important; }

</style>
